<section class="movieGenre">
    <button class="movieGenre__btn" [ngClass]="{`movieGenre__btn--selected`: !genreActuallySelected}" (click)="showAllMovies()">TOUT</button>
    @for (genre of movieGenres$ | async; track $index) {
        <button class="movieGenre__btn" [ngClass]="{`movieGenre__btn--selected`: genreActuallySelected === genre.id}" (click)="selectGenre(genre.id)">{{genre.name | uppercase}}</button>
    }
</section>
