        </button>
        <a class="link-back-home" routerLink="">NextCLAP.</a>
        <nav class="links-container" [class.menu-open]="menuIsOpen">

            <a class="link-page" routerLink="prochainement" (click)="menuIsOpen ? toggleMenu() : null" routerLinkActive="active">PROCHAINEMENT</a>
            <a class="link-page" routerLink="en-salle" (click)="menuIsOpen ? toggleMenu() : null" routerLinkActive="active">EN SALLE</a>

    <app-search-bar />
