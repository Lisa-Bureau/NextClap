<!-- Transmet le titre, les dates formatées et le flux des films au composant MovieList -->
<app-movie-list
    title="Les Sorties à Venir"
    [subtitle]="'Les sorties du ' + (startDay | date:'d MMMM yyyy') + ' au ' + (endDay | date:'d MMMM yyyy')"
    [movies$]="movieUpcoming$">   
</app-movie-list>
