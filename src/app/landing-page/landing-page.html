<section>
    <a routerLink="sorties">Les Sorties de la Semaine 
        <img src="/icons/arrow.png" alt="">
    </a>
    <div class="movies-container">
        @for (movie of movieReleases$ | async; track movie.id) {
            <app-movie-card [movie]="movie"/>
        }
    </div>
</section>
