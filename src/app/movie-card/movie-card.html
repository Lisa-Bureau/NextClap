<article class="movieCard">
    <div class="movieCard__media">
        <img class="movieCard__poster" [src]="`https://image.tmdb.org/t/p/w500${movie.poster_path}`" [alt]="movie.title">
        <div class="movieCard__overlay">
            <p class="movieCard__releaseDate">{{movie.release_date | date: "d MMMM yyyy"}}</p>
        </div>
    </div>
    <p class="movieCard__title">{{movie.title}}</p>
    <p class="movieCard__infos">{{movie.genres.join(' • ')}}</p>
</article>
